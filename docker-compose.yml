services:
  mongodb:
    image: mongo:7
    container_name: job-portal-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: job-portal-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      MONGO_URI: mongodb://mongodb:27017/job_portal_lite
      JWT_SECRET: beginner-friendly-demo-secret
      CLIENT_URL: http://localhost:4200
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: job-portal-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo-data:
